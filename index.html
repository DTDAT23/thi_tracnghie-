    // Hàm xáo trộn mảng (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Biến lưu trữ cấu trúc câu hỏi đã xáo trộn để dùng lúc chấm điểm
    let shuffledQuizData = [];

    // Render câu hỏi ra giao diện
    function renderQuiz() {
        quizContainer.innerHTML = ''; // Xóa nội dung cũ nếu có
        shuffledQuizData = []; // Làm rỗng mảng lưu trữ

        quizData.forEach((q) => {
            // Copy mảng options để không làm thay đổi mảng gốc
            let shuffledOptions = shuffleArray([...q.options]);
            
            // Lưu lại cấu trúc câu hỏi đã xáo trộn
            shuffledQuizData.push({
                id: q.id,
                options: shuffledOptions
            });

            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-block';
            questionDiv.id = `question-${q.id}`;

            let html = `<div class="question-title">Câu ${q.id}: ${q.question}</div>`;
            html += `<div class="options">`;
            
            // Gán nhãn A, B, C, D dựa theo thứ tự sau khi xáo trộn
            const labels = ['A', 'B', 'C', 'D'];
            
            shuffledOptions.forEach((opt, index) => {
                const labelLetter = labels[index];
                // Sử dụng index của option làm giá trị (value) để dễ dàng kiểm tra sau này
                html += `
                    <label id="label-${q.id}-${index}">
                        <input type="radio" name="q${q.id}" value="${index}"> 
                        <b>${labelLetter}.</b> ${opt.text}
                    </label>
                `;
            });
            
            html += `</div>`;
            questionDiv.innerHTML = html;
            quizContainer.appendChild(questionDiv);
        });
    }

    // Xử lý nộp bài và chấm điểm
    function submitQuiz() {
        let score = 0;
        let total = shuffledQuizData.length;

        shuffledQuizData.forEach((q) => {
            // Lấy đáp án người dùng chọn
            const selectedOption = document.querySelector(`input[name="q${q.id}"]:checked`);
            
            // Xóa các class đánh dấu cũ (nếu người dùng nộp lại nhiều lần)
            q.options.forEach((opt, index) => {
                document.getElementById(`label-${q.id}-${index}`).classList.remove('correct-answer', 'wrong-answer');
            });

            // Tìm index của đáp án đúng trong mảng đã xáo trộn
            const correctIndex = q.options.findIndex(opt => opt.isCorrect === true);

            if (selectedOption) {
                const userAnswerIndex = parseInt(selectedOption.value);
                
                if (userAnswerIndex === correctIndex) {
                    score++;
                    // Đánh dấu xanh cho đáp án đúng
                    document.getElementById(`label-${q.id}-${userAnswerIndex}`).classList.add('correct-answer');
                } else {
                    // Đánh dấu đỏ cho đáp án sai
                    document.getElementById(`label-${q.id}-${userAnswerIndex}`).classList.add('wrong-answer');
                    // Hiển thị đáp án đúng
                    document.getElementById(`label-${q.id}-${correctIndex}`).classList.add('correct-answer');
                }
            } else {
                // Nếu không chọn, chỉ hiển thị đáp án đúng
                document.getElementById(`label-${q.id}-${correctIndex}`).classList.add('correct-answer');
            }
        });

        // Hiển thị điểm số
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `Bạn đạt được: ${score} / ${total} câu!`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Khởi tạo trang web khi tải xong
    renderQuiz();
</script>

</body>
</html>
